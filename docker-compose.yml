services:
  postgres:
    image: postgres:16-alpine
    container_name: tender-analytics-postgres
    restart: unless-stopped

    environment:
      POSTGRES_DB: tender_analytics
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5432:5432"

    volumes:
      - tender-analytics-postgres-data:/var/lib/postgresql/data

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U postgres -d tender_analytics"
        ]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: src/TenderAnalytics.Api/Dockerfile

    container_name: tender-analytics-api
    restart: unless-stopped

    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__PostgreSql: Host=postgres;Port=5432;Database=tender_analytics;Username=postgres;Password=postgres

    ports:
      - "8080:8080"

    depends_on:
      postgres:
        condition: service_healthy

volumes:
  tender-analytics-postgres-data: