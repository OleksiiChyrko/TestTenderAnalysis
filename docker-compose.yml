services:
  postgres:
    image: postgres:16-alpine
    container_name: tender-analytics-postgres
    restart: unless-stopped

    environment:
      POSTGRES_DB: tender_analytics
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5432:5432"

    volumes:
      - tender-analytics-postgres-data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tender_analytics"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  tender-analytics-postgres-data: